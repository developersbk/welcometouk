<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudeesh's List</title>

  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">

  <style>
    body {
      background-color: #0f172a;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      padding: 20px;
      margin: 0;
    }

    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    h2 {
      margin-top: 0;
    }

    .nav-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .nav-link,
    .pdf-button,
    table button {
      background-color: #2563eb;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      font-size: 14px;
    }

    .nav-link.secondary {
      background-color: #334155;
    }

    .panel {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }

    table.dataTable {
      background-color: #1e293b;
    }

    table.dataTable th,
    table.dataTable td {
      padding: 10px;
      color: white;
    }

    .dataTables_length select {
      background-color: #1e293b;
      color: rgb(0, 0, 0);
      border: 1px solid #374151;
      padding: 6px;
      border-radius: 4px;
    }

    .dataTables_wrapper .dataTables_length select {
      background-color: #1e293b;
      color: white;
    }

    input,
    select {
      background-color: #1e293b;
      color: white;
      border: 1px solid #374151;
      padding: 6px;
      border-radius: 4px;
      margin: 4px;
    }

    #customSearch {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    .actions-hidden th:last-child,
    .actions-hidden td:last-child {
      display: none;
    }

    #productModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 9999;
      padding: 16px;
      box-sizing: border-box;
    }

    #productModalContent {
      background: #1e293b;
      margin: 7% auto;
      padding: 20px;
      width: min(360px, 100%);
      border-radius: 8px;
      box-sizing: border-box;
    }

    #productModal h3 {
      margin-top: 0;
    }

    div.dt-buttons .pdf-button {
      background-color: #2563eb !important;
      color: white !important;
      padding: 8px 12px !important;
      border: none !important;
      border-radius: 4px !important;
      cursor: pointer !important;
      font-size: 14px;
      margin-left: auto;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .hint {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.5;
      margin: 0;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .nav-row,
      .button-row {
        flex-direction: column;
        align-items: stretch;
      }

      .nav-link,
      .pdf-button,
      table button {
        width: 100%;
        text-align: center;
      }

      #productModalContent {
        margin: 24% auto;
      }
    }
  </style>
</head>

<body>
  <div class="page-wrap">
    <div class="nav-row">
      <a class="nav-link" href="sudeesh.html">Product List</a>
      <a class="nav-link secondary" href="swap.html">Swap Checker</a>
      <a class="nav-link secondary" href="employees.html">Employee Setup</a>
    </div>

    <div class="panel">
      <h2>Albrecht Discounts's Product List</h2>
      <p class="hint">Product list, swap checker, and employee setup are now linked together. Employee data is shared through the same Firebase project.</p>
    </div>

    <input type="text" id="customSearch" placeholder="Search table..." />

    <div id="topButtons" class="button-row">
      <button class="pdf-button" onclick="openModal()">Add Product</button>
      <button class="pdf-button" onclick="toggleActions()">Show Edit/Delete</button>
      <div id="pdfExportContainer"></div>
    </div>

    <div id="productModal">
      <div id="productModalContent">
        <h3>Add New Product</h3>
        <input id="newPLU" placeholder="PLU" />
        <input id="newCode" placeholder="Product Code" />
        <input id="newName" placeholder="Product Name" />
        <input id="newPrice" placeholder="Price" />
        <br><br>
        <button class="pdf-button" onclick="addRow()">Add</button>
        <button class="pdf-button" onclick="closeModal()">Cancel</button>
      </div>
    </div>

    <table id="employeeTable" class="display actions-hidden" style="width:100%">
      <thead>
        <tr>
          <th>PLU</th>
          <th>Product Code</th>
          <th>Product Name</th>
          <th>Price</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAku-atS5H_eCz1L50uC-1M8K34iHzy0_E",
      authDomain: "albrecht-discounts.firebaseapp.com",
      databaseURL: "https://albrecht-discounts-default-rtdb.firebaseio.com",
      projectId: "albrecht-discounts",
      storageBucket: "albrecht-discounts.firebasestorage.app",
      messagingSenderId: "63937039340",
      appId: "1:63937039340:web:df8f231bb151d4907acec9",
      measurementId: "G-CXMGRJES0H"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("products");

    let table;

    $(document).ready(function () {
      table = $('#employeeTable').DataTable({
        dom: 't<"bottom"lp>',
        order: [[2, 'asc']],
        buttons: [
          {
            extend: 'pdfHtml5',
            text: 'Export PDF',
            title: 'Albrecht Discounts Product List',
            className: 'pdf-button',
            exportOptions: { columns: ':not(:last-child)' }
          }
        ],
        columnDefs: [{
          targets: -1,
          orderable: false,
          defaultContent: ''
        }]
      });

      $('#customSearch').on('keyup', function () {
        table.search(this.value).draw();
      });

      table.buttons().container().appendTo('#pdfExportContainer');
      loadData();
    });

    function loadData() {
      db.off();
      table.clear().draw();

      db.on("child_added", snapshot => {
        const data = snapshot.val();
        const id = snapshot.key;
        addToTable(data, id);
      });

      db.on("child_changed", snapshot => {
        const data = snapshot.val();
        const id = snapshot.key;
        updateInTable(data, id);
      });

      db.on("child_removed", snapshot => {
        const id = snapshot.key;
        table.rows().every(function () {
          if (this.node().dataset.id === id) {
            this.remove();
          }
        });
        table.draw();
      });
    }

    function addRow() {
      const newProduct = {
        plu: $('#newPLU').val(),
        code: $('#newCode').val(),
        name: $('#newName').val(),
        price: $('#newPrice').val()
      };

      if (!newProduct.code || !newProduct.name) return alert("Product Code and Name are required");

      db.push(newProduct);
      closeModal();
    }

    function addToTable(data, id) {
      const rowNode = table.row.add([
        data.plu || "",
        data.code || "",
        data.name || "",
        data.price || "",
        `<button onclick="editRow('${id}', this)">Edit</button>
         <button onclick="deleteRow('${id}')">Delete</button>`
      ]).draw().node();

      rowNode.dataset.id = id;
    }

    function updateInTable(data, id) {
      table.rows().every(function () {
        if (this.node().dataset.id === id) {
          this.data([
            data.plu || "",
            data.code || "",
            data.name || "",
            data.price || "",
            `<button onclick="editRow('${id}', this)">Edit</button>
             <button onclick="deleteRow('${id}')">Delete</button>`
          ]).draw();
        }
      });
    }

    function deleteRow(id) {
      if (confirm("Delete this item?")) {
        db.child(id).remove();
      }
    }

    function editRow(id, button) {
      const row = $(button).closest('tr');
      const cells = row.find('td').not(':last');

      cells.each(function () {
        const text = $(this).text();
        $(this).html(`<input value="${text}" />`);
      });

      row.find('td:last').html(`
        <button onclick="saveRow('${id}', this)">Save</button>
        <button onclick="cancelEdit('${id}')">Cancel</button>
      `);
    }

    function saveRow(id, button) {
      const row = $(button).closest('tr');
      const inputs = row.find('input');

      const updated = {
        plu: inputs[0].value,
        code: inputs[1].value,
        name: inputs[2].value,
        price: inputs[3].value
      };

      db.child(id).set(updated);
    }

    function cancelEdit(id) {
      db.child(id).once('value', snapshot => {
        updateInTable(snapshot.val(), id);
      });
    }

    function openModal() {
      document.getElementById('productModal').style.display = 'block';
    }

    function closeModal() {
      document.getElementById('productModal').style.display = 'none';
      $('#newPLU, #newCode, #newName, #newPrice').val('');
    }

    function toggleActions() {
      const tableEl = document.getElementById('employeeTable');
      tableEl.classList.toggle('actions-hidden');
    }
  </script>
</body>

</html>
